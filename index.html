<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Search</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #111827; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; }
    .container { width: min(860px, 100%); display: grid; gap: 18px; }
    .hero { text-align: center; }
    .hero h1 { font-size: clamp(2rem, 3vw, 3rem); margin-bottom: 8px; color: #0f172a; }
    .hero p { color: #475569; font-size: 1rem; margin: 0; }
    .card { background: #ffffff; border: 1px solid rgba(15, 23, 42, 0.08); border-radius: 24px; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); padding: 24px; position: relative; overflow: hidden; }
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      top: 16px;
      bottom: 16px;
      width: 4px;
      background: linear-gradient(180deg, rgba(56,189,248,0.28), transparent 65%);
      opacity: 0.6;
      pointer-events: none;
      filter: blur(2px);
    }
    .card::before { left: 16px; }
    .card::after { right: 16px; }
    .card .credit {
      position: absolute;
      right: 18px;
      bottom: 14px;
      font-size: 0.8rem;
      color: #64748b;
      opacity: 0.95;
    }
    .response { display: grid; gap: 16px; min-height: 180px; }
    .response p { margin: 0; line-height: 1.8; color: #0f172a; }
    .response pre { margin: 0; background: #f1f5f9; border: 1px solid rgba(15, 23, 42, 0.06); border-radius: 18px; padding: 18px; overflow-x: auto; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace; font-size: 0.95rem; color: #0f172a; }
    .response code { background: rgba(56,189,248,0.12); padding: 4px 8px; border-radius: 8px; }
    .status { color: #475569; text-align: center; font-size: 0.95rem; margin-top: 12px; }
    .status.error { color: #ef4444; }
    .search-row { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: min(860px, calc(100% - 48px)); display: flex; gap: 12px; align-items: center; }
    .search-row input { flex: 1; min-height: 56px; padding: 0 18px; border-radius: 999px; border: 1px solid rgba(15, 23, 42, 0.12); background: #f8fafc; color: #0f172a; font-size: 1rem; outline: none; transition: border-color 0.25s ease, box-shadow 0.25s ease; }
    .search-row input:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56,189,248,0.12); }
    .search-row button { min-width: 64px; border: none; border-radius: 999px; background: #38bdf8; color: #020617; cursor: pointer; font-size: 1.1rem; height: 56px; }
    @media (max-width: 720px) {
      .search-row { width: calc(100% - 48px); flex-direction: column; }
      .search-row button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>AI Search</h1>
      <p>Simple colorful frontend with a bottom search bar.</p>
    </div>

    <div class="card">
      <div class="response" id="resultText">
        <p>Type your question into the box below, then press enter or click the button.</p>
      </div>
      <p id="status" class="status">Enter your question and press enter.</p>
      <div class="credit">Developed by Ravindra Prajapati</div>
    </div>
  </div>
  <div class="search-row">
    <input id="aiQuery" type="text" placeholder="Ask anything..." autocomplete="off" />
    <button id="askButton" aria-label="Search"><i class="fas fa-paper-plane"></i></button>
  </div>

  <script>
    const aiQuery = document.getElementById('aiQuery');
    const askButton = document.getElementById('askButton');
    const status = document.getElementById('status');
    const resultText = document.getElementById('resultText');

    function setStatus(text, error = false) {
      status.textContent = text;
      status.className = error ? 'status error' : 'status';
    }

    function renderAnswerText(rawText) {
      const lines = rawText.split('\n');
      resultText.innerHTML = '';

      lines.forEach(line => {
        if (!line.trim()) return;
        const p = document.createElement('p');
        p.textContent = line;
        resultText.appendChild(p);
      });
    }

    async function askAI(query) {
      setStatus('Searching...');
      renderAnswerText('Waiting for AI response...');
      try {
        const response = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const json = await response.json();
        if (!response.ok) {
          throw new Error(json?.detail || `Server returned ${response.status}`);
        }
        renderAnswerText(json.answer || 'No answer found.');
        setStatus(`Showing answer for: "${json.query}"`);
      } catch (error) {
        renderAnswerText('Koshish fir se karein.');
        setStatus(error.message, true);
      }
    }

    function sendQuery() {
      const query = aiQuery.value.trim();
      if (!query) return;
      aiQuery.value = '';
      askAI(query);
    }

    askButton.addEventListener('click', sendQuery);
    aiQuery.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendQuery();
      }
    });
  </script>
</body>
</html>
